<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WheelsShare - Beranda</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link href="../assets/css/style.css" rel="stylesheet">

  <style>
    /* Gradient Hero Box */
    .hero-box {
      background: linear-gradient(135deg, var(--ws-primary), #3B82F6);
      border-radius: 0 0 2rem 2rem;
      padding: 1rem 1.5rem 3.5rem;
      color: white;
      position: relative;
    }
    
    /* Search Bar Half Inside Hero */
    .hero-search {
      position: absolute;
      bottom: -1.75rem;
      left: 1.5rem;
      right: 1.5rem;
      z-index: 10;
    }

    /* Floating Chip Filter */
    .chip-filter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1rem;
      background: white;
      border: 1px solid var(--ws-border);
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ws-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .chip-filter.active {
      background: var(--ws-primary);
      color: white;
      border-color: var(--ws-primary);
    }
    
    /* Car Card Overrides */
    .car-img-wrap {
      height: 160px;
      border-radius: var(--ws-radius-lg) var(--ws-radius-lg) 0 0;
      overflow: hidden;
      position: relative;
    }
    .car-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s;
    }
    .ws-card:hover .car-img-wrap img { transform: scale(1.05); }
    .car-price-badge {
      position: absolute;
      bottom: 10px; right: 10px;
      background: rgba(25, 118, 210, 0.9);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* Horizontal scroll for categories */
    .h-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: none;
    }
    .h-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div class="mobile-wrapper">
  <div class="mobile-frame">
    
    <div class="mobile-content bg-light p-0">
      
      <!-- HERO SECTION -->
      <div class="hero-box">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center gap-2">
            <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=facearea&facepad=2&w=100&h=100&q=80" 
                 class="rounded-circle border border-2 border-white" width="40" height="40" alt="Avatar">
            <div>
              <p class="text-xs mb-0 text-white-50 lh-1">Lokasi saat ini</p>
              <div class="d-flex align-items-center gap-1 fw-bold text-sm">
                <span class="material-icons-round fs-6">place</span> Jakarta Selatan
              </div>
            </div>
          </div>
          <button class="btn btn-circle bg-white bg-opacity-25 border-0 text-white position-relative shadow-none">
            <span class="material-icons-round fs-5">notifications</span>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
          </button>
        </div>

        <h2 class="h4 fw-extrabold mb-0 lh-base">
          Temukan Mobil <br>Pilihanmu Hari Ini
        </h2>

        <!-- Search input half out -->
        <div class="hero-search search-wrapper shadow-sm">
          <span class="material-icons-round">search</span>
          <input type="text" class="form-control form-control-lg bg-white" placeholder="Cari merk atau kota...">
        </div>
      </div>

      <div class="px-4" style="margin-top: 2.5rem;">
        
        <!-- ACTIVE BOOKING BANNER (If any) -->
        <div id="activeBookingContainer" class="mb-4"></div>

        <!-- CATEGORY CHIPS -->
        <div class="h-scroll mb-4 px-1 mx-n1">
          <div class="chip-filter active">Semua</div>
          <div class="chip-filter">MPV</div>
          <div class="chip-filter">City Car</div>
          <div class="chip-filter">SUV</div>
          <div class="chip-filter">Premium</div>
        </div>

        <!-- CAR LIST (Dynamic) -->
        <div class="d-flex justify-content-between align-items-end mb-3">
          <h3 class="h6 fw-bold mb-0">Rekomendasi Terdekat</h3>
          <a href="map.html" class="text-primary-custom text-decoration-none text-xs fw-semibold">Lihat Peta <span class="material-icons-round text-xs align-middle">arrow_forward</span></a>
        </div>

        <div id="carList" class="d-flex flex-column gap-3 mb-4">
          <!-- Car Cards will be injected by JS -->
        </div>

      </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-item active">
        <span class="material-icons-round">home</span> Home
      </a>
      <a href="map.html" class="bottom-nav-item">
        <span class="material-icons-round">explore</span> Peta
      </a>
      <a href="orders.html" class="bottom-nav-item position-relative">
        <span class="material-icons-round">receipt_long</span> Pesanan
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.5rem; padding: 0.2rem 0.4rem;">1</span>
      </a>
      <a href="profile.html" class="bottom-nav-item">
        <span class="material-icons-round">person</span> Profil
      </a>
    </nav>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<!-- Shared Script & Data -->
<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Render Dynamic Active Booking (for demo: show current user's active)
  const activeBooking = WS_DATA.bookings.find(b => b.status === 'active');
  if (activeBooking) {
    const car = WS_DATA.cars.find(c => c.id === activeBooking.carId);
    document.getElementById('activeBookingContainer').innerHTML = `
      <div class="ws-card bg-primary-light border-primary border-opacity-25 p-3 d-flex align-items-center gap-3">
        <div class="bg-primary bg-opacity-10 p-2 rounded-3 text-primary-custom d-flex align-items-center justify-content-center">
          <span class="material-icons-round fs-3">history_toggle_off</span>
        </div>
        <div class="flex-grow-1">
          <div class="fw-bold text-sm mb-0">${car.name}</div>
          <div class="text-xs text-muted-custom">Berakhir ${formatDate(activeBooking.endDate)}</div>
        </div>
        <a href="car-condition.html" class="btn btn-primary btn-sm rounded-pill text-xs px-3 shadow-sm">Review</a>
      </div>
    `;
  }

  // Render Dynamic Car List (Available Cars)
  const carListContainer = document.getElementById('carList');
  const availableCars = WS_DATA.cars.filter(c => c.status === 'available');

  carListContainer.innerHTML = availableCars.map(car => `
    <a href="detail_mobil.html?id=${car.id}" class="ws-card text-decoration-none text-dark d-block">
      <div class="car-img-wrap">
        <img src="${car.image}" alt="${car.name}" loading="lazy">
        <div class="car-price-badge">${formatRupiah(car.price)}/hari</div>
      </div>
      <div class="p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <h4 class="h6 fw-bold mb-1">${car.name}</h4>
            <div class="d-flex gap-1 flex-wrap">
              <span class="badge border text-muted-custom fw-normal py-1" style="background-color: var(--ws-bg);">${car.transmission}</span>
              <span class="badge border text-muted-custom fw-normal py-1" style="background-color: var(--ws-bg);">${car.seats} Kursi</span>
            </div>
          </div>
          <div class="d-flex align-items-center text-warning fw-bold text-sm gap-1 bg-warning bg-opacity-10 px-2 py-1 rounded-pill">
            <span class="material-icons-round fs-6">star</span> ${car.rating}
          </div>
        </div>
        <div class="d-flex align-items-center gap-1 text-xs text-muted-custom">
          <span class="material-icons-round fs-6">place</span> ${car.location}
        </div>
      </div>
    </a>
  `).join('');

  // Setup Chips Filter Logic
  const chips = document.querySelectorAll('.chip-filter');
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });
});
</script>

</body>
</html>
